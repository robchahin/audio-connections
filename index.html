<!DOCTYPE html>
<html lang="en">
<head>

<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a1a;
    color: #f0f0f0;

  h1 { margin: 0 0 2px; font-size: 28px; }
  .byline { color: #aaa; font-size: 13px; margin-bottom: 10px; }
  .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
  .day-selector {
    max-width: 720px;
    margin: 0 auto 14px;
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .day-btn {
    background: transparent;
    border: 1px solid #555;
    color: #ccc;

    border-radius: 4px;

  }

    color: #888;
  }
  .day-btn.locked:hover { border-color: #555; color: #888; }
  .unlock-countdown {
    text-align: center;

  #status {
    max-width: 720px;

  }
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    max-width: 720px;
    margin: 0 auto 20px;
  }
  .tile {
    background: linear-gradient(180deg, #3a3a3a 0%, #1d1d1d 100%);
    border: 2px solid #0e0e0e;
    border-radius: 6px;

    text-align: center;
    transition: all 0.15s;

    flex-direction: column;

    align-items: center;

    position: relative;

  .reels {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 80%;
    height: 18px;
    position: relative;
    z-index: 0;

  .reel {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background:
      radial-gradient(circle, #050505 0%, #050505 22%, transparent 22%),
      repeating-conic-gradient(

    box-shadow: inset 0 0 1px rgba(255,255,255,0.15);

  @keyframes cassette-spin {
    from { transform: rotate(0deg); }

  .tile.playing .reel {
    animation: cassette-spin 1.5s linear infinite;

  .tile.selected {
    border-color: #4a9eff;
    background: linear-gradient(180deg, #2a4a7a 0%, #1e3a5f 100%);
  }
  .tile.exiting {
    opacity: 0;
    transform: scale(0.85);
    transition: opacity 0.35s ease, transform 0.35s ease;
    pointer-events: none;
  }
  .tile-label-input {
    background-color: #ddd5c0;
    border: 1px solid #6a5a3a;
    color: #1a1a1a;
    font-size: 13px;
    font-weight: 400;
    text-align: center;
    padding: 4px 6px;
    border-radius: 2px;
    font-family: 'Special Elite', 'Courier New', ui-monospace, monospace;
    letter-spacing: 0.3px;
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    z-index: 1;
    box-shadow: 0 1px 2px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.4);
    transition: left 0.18s ease, right 0.18s ease, padding 0.18s ease, font-size 0.18s ease, background-color 0.15s, border-color 0.15s, box-shadow 0.15s;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%23666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>');
    background-repeat: no-repeat;
    background-position: right 5px center;
  }
  .tile-label-input::placeholder { color: #999; font-weight: 400; }
  .tile-label-input:hover { background-color: #e8e0cb; border-color: #4a3a1a; }
  .tile-label-input:focus {
    border-color: #4a9eff;
    background-color: #f4eeda;
    outline: none;
    background-image: none;

    right: -30%;

  .tile-label-input:not(:placeholder-shown) {

  }
  .play-btn {
    background: linear-gradient(180deg, #5599df 0%, #2870be 100%);
    border: 1px solid #1d5396;
    color: white;

    font-size: 11px;
    font-weight: 700;

    z-index: 1;

      inset 0 -1px 0 rgba(0,0,0,0.3),

  .tile.selected .select-btn {
    background: linear-gradient(180deg, #5599df 0%, #2870be 100%);
    border-color: #1d5396;

  .controls {

    margin: 0 auto;
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  button.action {
    background: #4a9eff;
    border: none;
    color: white;
    padding: 12px 24px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
  }
  button.action:disabled { background: #444; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    border: 1px solid #555;
    color: #ccc;
  }
  #solved { max-width: 720px; margin: 0 auto 16px; }
  .solved-row {
    padding: 12px 16px;
    margin-bottom: 8px;
    border-radius: 6px;
    color: #1a1a1a;
  }
  .solved-row.theme-0 { background: #f9df6d; }
  .solved-row.theme-1 { background: #a0c35a; }
  .solved-row.theme-2 { background: #b0c4ef; }
  .solved-row.theme-3 { background: #ba81c5; }
  .solved-theme { font-weight: 700; }
  .solved-tracks { font-size: 13px; margin-top: 4px; }
  .solved-track-item { display: block; margin-top: 2px; }
  .solved-title { color: #1a1a1a; }
  .solved-artist { color: #4a4a4a; }
  .solved-note { color: #4a4a4a; font-style: italic; }
  .mistakes-row {
    max-width: 720px;
    margin: 4px auto 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #888;
  }
  .mistakes-dots { display: flex; gap: 6px; }
  .mistake-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #444;
  }
  .mistake-dot.used { background: #ff6b6b; }
  #end-panel {
    max-width: 720px;
    margin: 24px auto 0;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
  }
  #end-panel h2 { margin: 0 0 8px; font-size: 22px; }
  #end-panel.win h2 { color: #5fcf5f; }
  #end-panel.loss h2 { color: #ff6b6b; }
  .share-text {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 14px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 16px;
    line-height: 1.5;
    text-align: left;
    white-space: pre;
    margin: 14px auto;
    display: inline-block;
    user-select: all;
  }
  .copy-btn {
    background: #4a9eff;
    border: none;
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    display: block;
    margin: 0 auto;
  }
  .copy-btn:hover { background: #5aaeff; }
  .copy-btn.copied { background: #5fcf5f; }
</style>
</head>
<body>
  <h1 id="h1">Audio Connections 2</h1>
  <div class="byline">by Corey Farwell</div>
  <div class="day-selector" id="day-selector"></div>
  <div class="unlock-countdown" id="unlock-countdown"></div>
  <div class="subtitle">Find four groups of four. Tap to play, "Select" to group.</div>
  <div id="solved"></div>
  <div id="end-panel" style="display: none;"></div>
  <div id="grid"></div>
  <div id="status">Loading previews from iTunes…</div>
  <div class="mistakes-row">
    Mistakes remaining:
    <div class="mistakes-dots" id="mistakes-dots"></div>
  </div>
  <div class="controls">
    <button class="action secondary" id="deselect">Deselect</button>
    <button class="action" id="submit" disabled>Submit (0/4)</button>
  </div>

<script>
const puzzles = [
  {
    day: 1,
    themes: [
      {
        theme: "Heaven in the title",
        tracks: [
          { id: 31739774,   artist: "The Cure",         title: "Just Like Heaven" },
          { id: 580708180,  artist: "Led Zeppelin",     title: "Stairway to Heaven" },
          { id: 1648144423, artist: "Eric Clapton",     title: "Tears in Heaven" },
          { id: 1440771048, artist: "Belinda Carlisle", title: "Heaven Is a Place on Earth" }
        ]
      },
      {
        theme: "Canadian artists",
        tracks: [
          { id: 323395690,  artist: "Avril Lavigne",  title: "My Happy Ending" },
          { id: 1440661545, artist: "Justin Bieber",  title: "Baby" },
          { id: 1440823965, artist: "Bryan Adams",    title: "Summer of '69" },
          { id: 1440656027, artist: "Rush",           title: "Tom Sawyer" }
        ]
      },
      {
        theme: "Bands with repeated names",
        tracks: [
          { id: 696670364,  artist: "Talk Talk",      title: "It's My Life" },
          { id: 693610953,  artist: "Duran Duran",    title: "Hungry Like the Wolf" },
          { id: 1445308818, artist: "Yeah Yeah Yeahs", title: "Maps" },
          { id: 1440843876, artist: "The Go-Go's",    title: "We Got the Beat" }
        ]
      },
      {
        theme: "Bands of all siblings",
        tracks: [
          { id: 1440790544, artist: "Hanson",        title: "MMMBop" },
          { id: 1440912109, artist: "Jackson 5",     title: "ABC" },
          { id: 1445664553, artist: "Bee Gees",      title: "How Deep Is Your Love" },
          { id: 121052796,  artist: "Sister Sledge", title: "We Are Family" }
        ]
      }
    ]
  },
  {
    day: 2,
    releaseAt: '2026-05-11T00:00:00Z',
    themes: [
      {
        theme: "Songs made for movies",
        tracks: [
          { id: 507536740,  artist: "Céline Dion",        title: "My Heart Will Go On", note: "Titanic" },
          { id: 254685026,  artist: "Survivor",           title: "Eye of the Tiger",    note: "Rocky III" },
          { id: 1440903439, artist: "Eminem",             title: "Lose Yourself",       note: "8 Mile" },
          { id: 203304387,  artist: "Simon & Garfunkel",  title: "Mrs. Robinson",       note: "The Graduate" }
        ]
      },
      {
        theme: "Sense in the title",
        tracks: [
          { id: 1440783625, artist: "Nirvana",       title: "Smells Like Teen Spirit",        note: "smell" },
          { id: 217273922,  artist: "Johnny Nash",   title: "I Can See Clearly Now",          note: "sight" },
          { id: 1550208949, artist: "Mariah Carey",  title: "Touch My Body",                  note: "touch" },
          { id: 1444106658, artist: "Marvin Gaye",   title: "I Heard It Through the Grapevine", note: "hearing" }
        ]
      },
      {
        theme: "Cover of a Beatles song",
        tracks: [
          { id: 1434916256, artist: "Joe Cocker",    title: "With a Little Help from My Friends" },
          { id: 1469582093, artist: "Stevie Wonder", title: "We Can Work It Out" },
          { id: 995304388,  artist: "Tina Turner",   title: "Help!" },
          { id: 1738363769, artist: "Beyoncé",       title: "BLACKBIIRD" }
        ]
      },
      {
        theme: "Profession in the name",
        tracks: [
          { id: 1752214923, artist: "Sabrina Carpenter",  title: "Espresso" },
          { id: 169628364,  artist: "Spin Doctors",       title: "Two Princes" },
          { id: 1440797616, artist: "The Police",         title: "Roxanne" },
          { id: 20922894,   artist: "The Postal Service", title: "Such Great Heights" }
        ]
      }
    ]
  }
];

function isReleased(p) {
  if (!p.releaseAt) return true;
  return Date.now() >= new Date(p.releaseAt).getTime();
}

function latestReleasedIndex() {
  for (let i = puzzles.length - 1; i >= 0; i--) {
    if (isReleased(puzzles[i])) return i;
  }
  return 0;
}

let currentPuzzleIndex = latestReleasedIndex();
let puzzle = puzzles[currentPuzzleIndex].themes;
let initGeneration = 0;

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function jsonpLookup(itunesId, timeoutMs = 10000) {
  return new Promise((resolve, reject) => {
    const callbackName = `__itunes_cb_${itunesId}_${Math.random().toString(36).slice(2)}`;
    const script = document.createElement('script');
    let timer;
    const cleanup = () => {
      delete window[callbackName];
      script.remove();
      if (timer) clearTimeout(timer);
    };
    window[callbackName] = (data) => {
      cleanup();
      resolve(data.results[0] || null);
    };
    script.onerror = () => {
      cleanup();
      reject(new Error(`JSONP load failed for ${itunesId}`));
    };
    timer = setTimeout(() => {
      cleanup();
      reject(new Error(`JSONP timeout for ${itunesId}`));
    }, timeoutMs);
    script.src = `https://itunes.apple.com/lookup?id=${itunesId}&callback=${callbackName}`;
    document.head.appendChild(script);
  });
}

async function fetchPreviewUrl(itunesId, attempt = 1) {
  const MAX_ATTEMPTS = 6;
  try {
    const result = await jsonpLookup(itunesId);
    if (!result?.previewUrl) {
      console.warn(`No preview for ID ${itunesId}`);
      return null;
    }
    return result.previewUrl;
  } catch (e) {
    if (attempt < MAX_ATTEMPTS) {
      const delay = Math.min(500 * Math.pow(2, attempt - 1), 10000);
      await sleep(delay);
      return fetchPreviewUrl(itunesId, attempt + 1);
    }
    console.warn(`Failed to fetch ID ${itunesId} after ${attempt} attempts:`, e);
    return null;
  }
}

let tracks = [];
let selected = new Set();
let solvedThemes = new Set();
let notes = new Map();
let currentlyPlaying = null;
let currentAudio = null;
let mistakes = 0;
let guessHistory = [];
let guessSignatures = new Set();
let gameOver = false;
const MAX_MISTAKES = 4;
const THEME_EMOJI = ['🟨', '🟩', '🟦', '🟪'];

function escapeHtml(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

let statusTimeout = null;
function setStatus(text) {
  const status = document.getElementById('status');
  status.textContent = text;
  if (statusTimeout) clearTimeout(statusTimeout);
  statusTimeout = setTimeout(() => {
    if (status.textContent === text) status.textContent = '';
    statusTimeout = null;
  }, 2500);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function init() {
  const myGen = ++initGeneration;
  const status = document.getElementById('status');
  const all = [];
  for (let t = 0; t < puzzle.length; t++) {
    for (const trk of puzzle[t].tracks) all.push({ themeIdx: t, ...trk });
  }

  const previewUrls = [];
  for (let i = 0; i < all.length; i++) {
    if (myGen !== initGeneration) return;
    status.textContent = `Loading previews… (${i + 1}/${all.length})`;
    previewUrls.push(await fetchPreviewUrl(all[i].id));
    if (i < all.length - 1) await sleep(150);
  }
  if (myGen !== initGeneration) return;

  tracks = all
    .map((x, i) => previewUrls[i] ? {
      id: i,
      themeIdx: x.themeIdx,
      previewUrl: previewUrls[i],
      artist: x.artist,
      title: x.title,
      note: x.note,
    } : null)
    .filter(t => t !== null);

  status.textContent = tracks.length < all.length
    ? `Only got ${tracks.length}/${all.length} previews — some queries failed.`
    : '';
  tracks = shuffle(tracks);
  render();
}

function switchPuzzle(idx) {
  if (idx === currentPuzzleIndex) return;
  if (!isReleased(puzzles[idx])) return;
  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }
  currentlyPlaying = null;
  selected = new Set();
  solvedThemes = new Set();
  notes = new Map();
  mistakes = 0;
  guessHistory = [];
  guessSignatures = new Set();
  gameOver = false;
  tracks = [];
  currentPuzzleIndex = idx;
  puzzle = puzzles[currentPuzzleIndex].themes;
  updateHeader();
  render();
  init();
}

function updateHeader() {
  const day = puzzles[currentPuzzleIndex].day;
  document.getElementById('h1').textContent = `Audio Connections ${day}`;
  document.title = `Audio Connections ${day} — by Corey Farwell`;
  document.querySelectorAll('.day-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.idx) === currentPuzzleIndex);
  });
}

let countdownInterval = null;

function tickCountdown() {
  const div = document.getElementById('unlock-countdown');
  const next = puzzles.find(p => !isReleased(p));
  if (!next) {
    div.textContent = '';
    if (countdownInterval) {
      clearInterval(countdownInterval);
      countdownInterval = null;
    }
    return;
  }
  const ms = new Date(next.releaseAt).getTime() - Date.now();
  if (ms <= 0) {
    div.textContent = '';
    renderDaySelector();
    updateHeader();
    if (countdownInterval) {
      clearInterval(countdownInterval);
      countdownInterval = null;
    }
    return;
  }
  const totalSec = Math.floor(ms / 1000);
  const days = Math.floor(totalSec / 86400);
  const hours = Math.floor((totalSec % 86400) / 3600);
  const minutes = Math.floor((totalSec % 3600) / 60);
  const seconds = totalSec % 60;
  const pad = n => String(n).padStart(2, '0');
  const str = days > 0
    ? `${days}d ${hours}h ${minutes}m`
    : `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
  div.textContent = `Day ${next.day} unlocks in ${str}`;
}

function startCountdown() {
  tickCountdown();
  if (!countdownInterval && puzzles.some(p => !isReleased(p))) {
    countdownInterval = setInterval(tickCountdown, 1000);
  }
}

window.unlockAll = function() {
  for (const p of puzzles) delete p.releaseAt;
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
  document.getElementById('unlock-countdown').textContent = '';
  renderDaySelector();
  console.log('All puzzles unlocked. Reload the page to revert.');
};

function renderDaySelector() {
  const sel = document.getElementById('day-selector');
  sel.innerHTML = '';
  puzzles.forEach((p, idx) => {
    const released = isReleased(p);
    const btn = document.createElement('button');
    btn.className = 'day-btn'
      + (idx === currentPuzzleIndex ? ' active' : '')
      + (!released ? ' locked' : '');
    btn.textContent = released ? `Day ${p.day}` : `Day ${p.day} 🔒`;
    btn.dataset.idx = idx;
    btn.disabled = !released;
    if (!released) {
      const when = new Date(p.releaseAt);
      btn.title = `Unlocks ${when.toUTCString()}`;
    }
    btn.addEventListener('click', () => switchPuzzle(idx));
    sel.appendChild(btn);
  });
}

function updateSubmit() {
  const submit = document.getElementById('submit');
  if (gameOver) {
    submit.textContent = solvedThemes.size === puzzle.length ? 'Solved' : 'Game over';
    submit.disabled = true;
  } else {
    submit.textContent = `Submit (${selected.size}/4)`;
    submit.disabled = selected.size !== 4;
  }
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const visible = tracks.filter(t => !solvedThemes.has(t.themeIdx));
  visible.forEach((track, idx) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.dataset.trackId = track.id;
    if (selected.has(track.id)) tile.classList.add('selected');
    tile.innerHTML = `
      <input class="tile-label-input" type="text"
        placeholder="Track ${idx + 1}"
        data-note="${track.id}"
        value="${escapeHtml(notes.get(track.id) || '')}">
      <div class="reels"><span class="reel"></span><span class="reel"></span></div>
      <button class="play-btn" data-id="${track.id}">▶</button>
      <button class="select-btn" data-select="${track.id}">
        ${selected.has(track.id) ? 'Selected' : 'Select'}
      </button>`;
    grid.appendChild(tile);
  });

  document.querySelectorAll('.play-btn').forEach(btn =>
    btn.addEventListener('click', () => togglePlay(parseInt(btn.dataset.id))));
  document.querySelectorAll('.select-btn').forEach(btn =>
    btn.addEventListener('click', () => toggleSelect(parseInt(btn.dataset.select))));
  document.querySelectorAll('.tile-label-input').forEach(input => {
    input.addEventListener('input', e =>
      notes.set(parseInt(input.dataset.note), e.target.value));
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === 'Escape') {
        e.preventDefault();
        input.blur();
      }
    });
  });

  updateSubmit();
  renderSolved();
  updatePlayButtons();
  renderMistakes();
  renderEndPanel();
}

function renderMistakes() {
  const dots = document.getElementById('mistakes-dots');
  dots.innerHTML = '';
  for (let i = 0; i < MAX_MISTAKES; i++) {
    const d = document.createElement('div');
    d.className = 'mistake-dot' + (i < mistakes ? ' used' : '');
    dots.appendChild(d);
  }
}

function buildShareText() {
  const day = puzzles[currentPuzzleIndex].day;
  const lines = [`Audio Connections ${day}`, ''];
  for (const guess of guessHistory) {
    lines.push(guess.themes.map(t => THEME_EMOJI[t]).join(''));
  }
  return lines.join('\n');
}

function renderEndPanel() {
  const panel = document.getElementById('end-panel');
  if (!gameOver) {
    panel.style.display = 'none';
    panel.innerHTML = '';
    return;
  }
  const won = solvedThemes.size === puzzle.length && mistakes < MAX_MISTAKES;
  panel.className = won ? 'win' : 'loss';
  panel.style.display = 'block';
  const shareText = buildShareText();
  panel.innerHTML = `
    <h2>${won ? 'Solved!' : 'Game over'}</h2>
    <div class="share-text">${shareText}</div>
    <button class="copy-btn" id="copy-btn">Copy result</button>
  `;
  document.getElementById('copy-btn').addEventListener('click', async () => {
    const btn = document.getElementById('copy-btn');
    try {
      await navigator.clipboard.writeText(shareText);
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy result';
        btn.classList.remove('copied');
      }, 1500);
    } catch (e) {
      btn.textContent = 'Copy failed — select text manually';
    }
  });
}

function renderSolved() {
  const div = document.getElementById('solved');
  div.innerHTML = '';
  for (const themeIdx of solvedThemes) {
    const themeTracks = tracks.filter(t => t.themeIdx === themeIdx);
    const trackList = themeTracks.map(t => {
      const noteHtml = t.note
        ? ` <span class="solved-note">(${escapeHtml(t.note)})</span>`
        : '';
      return `<div class="solved-track-item">
        <span class="solved-title">${escapeHtml(t.title || '?')}</span>
        <span class="solved-artist">— ${escapeHtml(t.artist || '?')}</span>${noteHtml}
      </div>`;
    }).join('');
    const row = document.createElement('div');
    row.className = `solved-row theme-${themeIdx}`;
    row.innerHTML = `<div class="solved-theme">${escapeHtml(puzzle[themeIdx].theme)}</div>
      <div class="solved-tracks">${trackList}</div>`;
    div.appendChild(row);
  }
}

function togglePlay(id) {
  const track = tracks.find(t => t.id === id);
  if (!track) return;

  const isThisActuallyPlaying = currentAudio
    && currentlyPlaying === id
    && !currentAudio.paused
    && !currentAudio.ended;

  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }

  if (isThisActuallyPlaying) {
    currentlyPlaying = null;
    updatePlayButtons();
    return;
  }

  currentAudio = new Audio(track.previewUrl);
  currentlyPlaying = id;
  currentAudio.addEventListener('ended', () => {
    if (currentlyPlaying === id) {
      currentlyPlaying = null;
      updatePlayButtons();
    }
  });
  updatePlayButtons();
  currentAudio.play().catch(err => {
    console.warn('Audio play failed:', err);
    if (currentlyPlaying === id) {
      currentlyPlaying = null;
      updatePlayButtons();
    }
  });
}

function updatePlayButtons() {
  document.querySelectorAll('.play-btn').forEach(btn => {
    const id = parseInt(btn.dataset.id);
    const tile = btn.closest('.tile');
    const isPlaying = id === currentlyPlaying;
    btn.classList.toggle('playing', isPlaying);
    btn.textContent = isPlaying ? '⏸' : '▶';
    if (tile) tile.classList.toggle('playing', isPlaying);
  });
}

function toggleSelect(id) {
  if (gameOver) return;
  if (selected.has(id)) selected.delete(id);
  else if (selected.size < 4) selected.add(id);
  render();
}

document.getElementById('deselect').addEventListener('click', () => {
  selected.clear();
  render();
});

document.getElementById('submit').addEventListener('click', () => {
  if (gameOver) return;
  const ids = [...selected];
  const sig = [...ids].sort((a, b) => a - b).join(',');
  if (guessSignatures.has(sig)) {
    setStatus('Already guessed!');
    return;
  }
  guessSignatures.add(sig);
  const themes = ids.map(id => tracks.find(t => t.id === id).themeIdx);
  const counts = {};
  themes.forEach(t => counts[t] = (counts[t] || 0) + 1);
  const maxCount = Math.max(...Object.values(counts));
  const correct = maxCount === 4;
  guessHistory.push({ themes: [...themes], correct });

  const exitingThemes = new Set();

  if (correct) {
    exitingThemes.add(themes[0]);
    solvedThemes.add(themes[0]);
    selected.clear();
    if (solvedThemes.size === puzzle.length) {
      gameOver = true;
      setStatus('All four solved.');
    } else {
      setStatus(`Solved: ${puzzle[themes[0]].theme}`);
    }
  } else {
    mistakes++;
    if (mistakes >= MAX_MISTAKES) {
      gameOver = true;
      for (let i = 0; i < puzzle.length; i++) {
        if (!solvedThemes.has(i)) exitingThemes.add(i);
        solvedThemes.add(i);
      }
      selected.clear();
      setStatus('Out of mistakes.');
    } else if (maxCount === 3) {
      setStatus('One away…');
    } else {
      setStatus('Not a group. Try again.');
    }
  }

  if (exitingThemes.size > 0) {
    document.querySelectorAll('.tile').forEach(tile => {
      const id = parseInt(tile.dataset.trackId);
      const trk = tracks.find(t => t.id === id);
      if (trk && exitingThemes.has(trk.themeIdx)) {
        tile.classList.add('exiting');
      }
    });
    renderSolved();
    renderMistakes();
    renderEndPanel();
    updateSubmit();
    setTimeout(render, 400);
  } else {
    render();
  }
});

renderDaySelector();
updateHeader();
startCountdown();
init();
</script>
</body>
</html>
