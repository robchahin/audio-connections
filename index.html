<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Connections 1 — by Corey Farwell</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a1a;
    color: #f0f0f0;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  h1 { margin: 0 0 2px; font-size: 28px; }
  .byline { color: #aaa; font-size: 13px; margin-bottom: 10px; }
  .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
  #status {
    max-width: 720px;
    margin: 0 auto 16px;
    color: #ffaa55;
    min-height: 20px;
    text-align: center;
    font-size: 14px;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    max-width: 720px;
    margin: 0 auto 20px;
  }
  .tile {
    background: #2a2a2a;
    border: 2px solid #333;
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
    transition: all 0.15s;
    min-height: 150px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
  }
  .tile.selected {
    border-color: #4a9eff;
    background: #1e3a5f;
  }
  .tile.solved { opacity: 0.45; pointer-events: none; }
  .tile-label-input {
    background: transparent;
    border: 1px solid transparent;
    color: #f0f0f0;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    padding: 4px 6px;
    border-radius: 4px;
    width: 100%;
    font-family: inherit;
	/* add pencil to indicate that titles can be edited */
	background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23A0A0A0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>');
  background-repeat: no-repeat;
  background-position: right 8px center;
  }
  .tile-label-input::placeholder { color: #888; font-weight: 600; }
  .tile-label-input:hover { border-color: #444; }
  .tile-label-input:focus {
    border-color: #4a9eff;
    background: #1a1a1a;
    outline: none;
	background-image: none; /* hide pencil while typing */
  }
  .play-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #4a9eff;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .play-btn:hover { background: #5aaeff; }
  .play-btn.playing { background: #ff6b6b; }
  .play-btn:disabled { background: #555; cursor: not-allowed; }
  .select-btn {
    background: transparent;
    border: 1px solid #555;
    color: #ccc;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    width: 100%;
  }
  .tile.selected .select-btn {
    background: #4a9eff;
    border-color: #4a9eff;
    color: white;
  }
  .controls {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  button.action {
    background: #4a9eff;
    border: none;
    color: white;
    padding: 12px 24px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
  }
  button.action:disabled { background: #444; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    border: 1px solid #555;
    color: #ccc;
  }
  #solved { max-width: 720px; margin: 0 auto 16px; }
  .solved-row {
    padding: 12px 16px;
    margin-bottom: 8px;
    border-radius: 6px;
    color: #1a1a1a;
  }
  .solved-row.theme-0 { background: #f9df6d; }
  .solved-row.theme-1 { background: #a0c35a; }
  .solved-row.theme-2 { background: #b0c4ef; }
  .solved-row.theme-3 { background: #ba81c5; }
  .solved-theme { font-weight: 700; }
  .solved-tracks { font-size: 13px; margin-top: 4px; }
  .solved-track-item { display: block; margin-top: 2px; }
  .solved-title { color: #1a1a1a; }
  .solved-artist { color: #4a4a4a; }
  .mistakes-row {
    max-width: 720px;
    margin: 0 auto 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #888;
  }
  .mistakes-dots { display: flex; gap: 6px; }
  .mistake-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #444;
  }
  .mistake-dot.used { background: #ff6b6b; }
  #end-panel {
    max-width: 720px;
    margin: 24px auto 0;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 20px;
    text-align: center;
  }
  #end-panel h2 { margin: 0 0 8px; font-size: 22px; }
  #end-panel.win h2 { color: #5fcf5f; }
  #end-panel.loss h2 { color: #ff6b6b; }
  .share-text {
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 14px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 16px;
    line-height: 1.5;
    text-align: left;
    white-space: pre;
    margin: 14px auto;
    display: inline-block;
    user-select: all;
  }
  .copy-btn {
    background: #4a9eff;
    border: none;
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    display: block;
    margin: 0 auto;
  }
  .copy-btn:hover { background: #5aaeff; }
  .copy-btn.copied { background: #5fcf5f; }
</style>
</head>
<body>
  <h1>Audio Connections 1</h1>
  <div class="byline">by Corey Farwell</div>
  <div class="subtitle">Find four groups of four. Tap to play, "Select" to group.</div>
  <div class="mistakes-row">
    Mistakes remaining:
    <div class="mistakes-dots" id="mistakes-dots"></div>
  </div>
  <div id="status">Loading previews from iTunes…</div>
  <div id="solved"></div>
  <div id="end-panel" style="display: none;"></div>
  <div id="grid"></div>
  <div class="controls">
    <button class="action secondary" id="deselect">Deselect</button>
    <button class="action" id="submit" disabled>Submit (0/4)</button>
  </div>

<script>
const puzzle = [
  {
    theme: "Heaven in the title",
    trackIds: [
      31739774,    // Just Like Heaven — The Cure
      580708180,   // Stairway to Heaven — Led Zeppelin
      1648144423,  // Tears in Heaven — Eric Clapton
      1440771048,  // Heaven Is a Place on Earth — Belinda Carlisle
    ]
  },
  {
    theme: "Canadian artists",
    trackIds: [
      323395690,   // My Happy Ending — Avril Lavigne
      1440661545,  // Baby — Justin Bieber
      1440823965,  // Summer of '69 — Bryan Adams
      1440656027,  // Tom Sawyer — Rush
    ]
  },
  {
    theme: "Bands with repeated names",
    trackIds: [
      696670364,   // It's My Life — Talk Talk
      693610953,   // Hungry Like the Wolf — Duran Duran
      1445308818,  // Maps — Yeah Yeah Yeahs
      1440843876,  // We Got the Beat — The Go-Go's
    ]
  },
  {
    theme: "Bands of all siblings",
    trackIds: [
      1440790544,  // MMMBop — Hanson
      1440912109,  // ABC — Jackson 5
      1445664553,  // How Deep Is Your Love — Bee Gees
      121052796,   // We Are Family — Sister Sledge
    ]
  }
];

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function jsonpLookup(itunesId, timeoutMs = 10000) {
  return new Promise((resolve, reject) => {
    const callbackName = `__itunes_cb_${itunesId}_${Math.random().toString(36).slice(2)}`;
    const script = document.createElement('script');
    let timer;
    const cleanup = () => {
      delete window[callbackName];
      script.remove();
      if (timer) clearTimeout(timer);
    };
    window[callbackName] = (data) => {
      cleanup();
      resolve(data.results[0] || null);
    };
    script.onerror = () => {
      cleanup();
      reject(new Error(`JSONP load failed for ${itunesId}`));
    };
    timer = setTimeout(() => {
      cleanup();
      reject(new Error(`JSONP timeout for ${itunesId}`));
    }, timeoutMs);
    script.src = `https://itunes.apple.com/lookup?id=${itunesId}&callback=${callbackName}`;
    document.head.appendChild(script);
  });
}

async function fetchTrack(itunesId, attempt = 1) {
  const MAX_ATTEMPTS = 6;
  try {
    const result = await jsonpLookup(itunesId);
    if (!result?.previewUrl) {
      console.warn(`No preview for ID ${itunesId}`);
      return null;
    }
    return {
      previewUrl: result.previewUrl,
      trackName: result.trackName,
      artistName: result.artistName,
    };
  } catch (e) {
    if (attempt < MAX_ATTEMPTS) {
      const delay = Math.min(500 * Math.pow(2, attempt - 1), 10000);
      await sleep(delay);
      return fetchTrack(itunesId, attempt + 1);
    }
    console.warn(`Failed to fetch ID ${itunesId} after ${attempt} attempts:`, e);
    return null;
  }
}

let tracks = [];
let selected = new Set();
let solvedThemes = new Set();
let notes = new Map();
let currentlyPlaying = null;
let currentAudio = null;
let mistakes = 0;
let guessHistory = [];
let guessSignatures = new Set();
let gameOver = false;
const MAX_MISTAKES = 4;
const THEME_EMOJI = ['🟨', '🟩', '🟦', '🟪'];

function escapeHtml(s) {
  return s
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

let statusTimeout = null;
function setStatus(text) {
  const status = document.getElementById('status');
  status.textContent = text;
  if (statusTimeout) clearTimeout(statusTimeout);
  statusTimeout = setTimeout(() => {
    if (status.textContent === text) status.textContent = '';
    statusTimeout = null;
  }, 2500);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function init() {
  const status = document.getElementById('status');
  const all = [];
  for (let t = 0; t < puzzle.length; t++) {
    for (const itunesId of puzzle[t].trackIds) all.push({ themeIdx: t, itunesId });
  }

  const trackData = [];
  for (let i = 0; i < all.length; i++) {
    status.textContent = `Loading previews… (${i + 1}/${all.length})`;
    trackData.push(await fetchTrack(all[i].itunesId));
    if (i < all.length - 1) await sleep(150);
  }

  tracks = all
    .map((x, i) => trackData[i] ? { id: i, themeIdx: x.themeIdx, ...trackData[i] } : null)
    .filter(t => t !== null);

  status.textContent = tracks.length < all.length
    ? `Only got ${tracks.length}/${all.length} previews — some queries failed.`
    : '';
  tracks = shuffle(tracks);
  render();
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  tracks.forEach((track, idx) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    if (selected.has(track.id)) tile.classList.add('selected');
    if (solvedThemes.has(track.themeIdx)) tile.classList.add('solved');
    tile.innerHTML = `
      <input class="tile-label-input" type="text"
        placeholder="Track ${idx + 1}" 
        data-note="${track.id}"
        value="${escapeHtml(notes.get(track.id) || '')}">
      <button class="play-btn" data-id="${track.id}">▶</button>
      <button class="select-btn" data-select="${track.id}">
        ${selected.has(track.id) ? 'Selected' : 'Select'}
      </button>`;
    grid.appendChild(tile);
  });

  document.querySelectorAll('.play-btn').forEach(btn =>
    btn.addEventListener('click', () => togglePlay(parseInt(btn.dataset.id))));
  document.querySelectorAll('.select-btn').forEach(btn =>
    btn.addEventListener('click', () => toggleSelect(parseInt(btn.dataset.select))));
  document.querySelectorAll('.tile-label-input').forEach(input =>
    input.addEventListener('input', e =>
      notes.set(parseInt(input.dataset.note), e.target.value)));

  const submit = document.getElementById('submit');
  if (gameOver) {
    submit.textContent = solvedThemes.size === puzzle.length ? 'Solved' : 'Game over';
    submit.disabled = true;
  } else {
    submit.textContent = `Submit (${selected.size}/4)`;
    submit.disabled = selected.size !== 4;
  }
  renderSolved();
  updatePlayButtons();
  renderMistakes();
  renderEndPanel();
}

function renderMistakes() {
  const dots = document.getElementById('mistakes-dots');
  dots.innerHTML = '';
  for (let i = 0; i < MAX_MISTAKES; i++) {
    const d = document.createElement('div');
    d.className = 'mistake-dot' + (i < mistakes ? ' used' : '');
    dots.appendChild(d);
  }
}

function buildShareText() {
  const lines = ['Audio Connections 1', ''];
  for (const guess of guessHistory) {
    lines.push(guess.themes.map(t => THEME_EMOJI[t]).join(''));
  }
  return lines.join('\n');
}

function renderEndPanel() {
  const panel = document.getElementById('end-panel');
  if (!gameOver) {
    panel.style.display = 'none';
    panel.innerHTML = '';
    return;
  }
  const won = solvedThemes.size === puzzle.length && mistakes < MAX_MISTAKES;
  panel.className = won ? 'win' : 'loss';
  panel.style.display = 'block';
  const shareText = buildShareText();
  panel.innerHTML = `
    <h2>${won ? 'Solved!' : 'Game over'}</h2>
    <div class="share-text">${shareText}</div>
    <button class="copy-btn" id="copy-btn">Copy result</button>
  `;
  document.getElementById('copy-btn').addEventListener('click', async () => {
    const btn = document.getElementById('copy-btn');
    try {
      await navigator.clipboard.writeText(shareText);
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy result';
        btn.classList.remove('copied');
      }, 1500);
    } catch (e) {
      btn.textContent = 'Copy failed — select text manually';
    }
  });
}

function renderSolved() {
  const div = document.getElementById('solved');
  div.innerHTML = '';
  for (const themeIdx of solvedThemes) {
    const themeTracks = tracks.filter(t => t.themeIdx === themeIdx);
    const trackList = themeTracks.map(t =>
      `<div class="solved-track-item">
        <span class="solved-title">${escapeHtml(t.trackName || '?')}</span>
        <span class="solved-artist">— ${escapeHtml(t.artistName || '?')}</span>
      </div>`
    ).join('');
    const row = document.createElement('div');
    row.className = `solved-row theme-${themeIdx}`;
    row.innerHTML = `<div class="solved-theme">${escapeHtml(puzzle[themeIdx].theme)}</div>
      <div class="solved-tracks">${trackList}</div>`;
    div.appendChild(row);
  }
}

function togglePlay(id) {
  const track = tracks.find(t => t.id === id);
  if (!track) return;

  const isThisActuallyPlaying = currentAudio
    && currentlyPlaying === id
    && !currentAudio.paused
    && !currentAudio.ended;

  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }

  if (isThisActuallyPlaying) {
    currentlyPlaying = null;
    updatePlayButtons();
    return;
  }

  currentAudio = new Audio(track.previewUrl);
  currentlyPlaying = id;
  currentAudio.addEventListener('ended', () => {
    if (currentlyPlaying === id) {
      currentlyPlaying = null;
      updatePlayButtons();
    }
  });
  updatePlayButtons();
  currentAudio.play().catch(err => {
    console.warn('Audio play failed:', err);
    if (currentlyPlaying === id) {
      currentlyPlaying = null;
      updatePlayButtons();
    }
  });
}

function updatePlayButtons() {
  document.querySelectorAll('.play-btn').forEach(btn => {
    const id = parseInt(btn.dataset.id);
    if (id === currentlyPlaying) {
      btn.classList.add('playing');
      btn.textContent = '⏸';
    } else {
      btn.classList.remove('playing');
      btn.textContent = '▶';
    }
  });
}

function toggleSelect(id) {
  if (gameOver) return;
  if (selected.has(id)) selected.delete(id);
  else if (selected.size < 4) selected.add(id);
  render();
}

document.getElementById('deselect').addEventListener('click', () => {
  selected.clear();
  render();
});

document.getElementById('submit').addEventListener('click', () => {
  if (gameOver) return;
  const ids = [...selected];
  const sig = [...ids].sort((a, b) => a - b).join(',');
  if (guessSignatures.has(sig)) {
    setStatus('Already guessed!');
    return;
  }
  guessSignatures.add(sig);
  const themes = ids.map(id => tracks.find(t => t.id === id).themeIdx);
  const counts = {};
  themes.forEach(t => counts[t] = (counts[t] || 0) + 1);
  const maxCount = Math.max(...Object.values(counts));
  const correct = maxCount === 4;
  guessHistory.push({ themes: [...themes], correct });

  if (correct) {
    solvedThemes.add(themes[0]);
    selected.clear();
    if (solvedThemes.size === puzzle.length) {
      gameOver = true;
      setStatus('All four solved.');
    } else {
      setStatus(`Solved: ${puzzle[themes[0]].theme}`);
    }
  } else {
    mistakes++;
    if (mistakes >= MAX_MISTAKES) {
      gameOver = true;
      for (let i = 0; i < puzzle.length; i++) solvedThemes.add(i);
      selected.clear();
      setStatus('Out of mistakes.');
    } else if (maxCount === 3) {
      setStatus('One away…');
    } else {
      setStatus('Not a group. Try again.');
    }
  }
  render();
});

init();
</script>
</body>
</html>
