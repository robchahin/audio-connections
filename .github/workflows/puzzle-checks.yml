name: Puzzle PR checks

# Pre-merge validation for puzzle changes, path-filtered to fire only when a
# PR (or manual dispatch) touches a puzzle file. Gated by the `puzzle-checks`
# GitHub environment — the job pauses at the gate until a required reviewer
# clicks Approve in the Actions UI, so a PR can't fire any step (network
# call, npm install, etc.) on its own.
#
# One-time setup so the gate works:
#   1. Repo Settings → Environments → New environment "puzzle-checks".
#   2. Under "Required reviewers", add the maintainer(s) allowed to
#      green-light a puzzle PR's checks.
#   Until that environment exists with reviewers, GitHub may either skip
#   the job with an error or run it unguarded depending on org defaults —
#   configure it before relying on the gate.
#
# Post-merge validation lives in itunes-postmerge.yml, which re-runs
# `npm run test:itunes` on pushes to main that touch a puzzle file.

on:
  pull_request:
    paths:
      - 'src/puzzles/*.ts'
      - '!src/puzzles/template.ts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    environment: puzzle-checks
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:unit
      - run: npm run test:itunes
