name: Past-day guard

# Fails a PR that moves an ALREADY-RELEASED puzzle — a reorder, rename, or
# re-date of any day whose release date is on/before today. Released days are
# frozen: their number, date, and slug (= localStorage save key) are a matter
# of record, so changing one orphans saves and rewrites public history.
#
# This is MAINTAINER feedback about scheduling, distinct from puzzle-checks.yml
# (SUBMITTER feedback about a single puzzle's correctness) — hence its own file.
#
# It's time-aware (it asks "what's released *today*?" and diffs the schedule
# against the base branch), which is exactly why it's a CI job and not part of
# the deterministic unit suite. The pure comparison it runs, diffPastDays(), is
# unit-tested in src/schedule.test.ts; this just feeds it the clock + git.
#
# Path-filtered to the only files that can move a past day: the schedule itself
# (LAUNCH_EPOCH lives there too) and the puzzle files (a rename shows up here).

on:
  pull_request:
    paths:
      - 'src/schedule.ts'
      - 'src/puzzles/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  past-day-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # need history so the base branch is resolvable
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Make the base branch available as origin/<base> for the diff. On a PR,
      # github.base_ref is the target branch; default to main otherwise.
      - name: Fetch base branch
        env:
          BASE: ${{ github.base_ref || 'main' }}
        run: git fetch --no-tags origin "+refs/heads/${BASE}:refs/remotes/origin/${BASE}"
      - name: Check no released day moved
        env:
          BASE: ${{ github.base_ref || 'main' }}
        run: npm run test:past-days -- "origin/${BASE}"
