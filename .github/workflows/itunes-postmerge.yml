name: iTunes ID check (post-merge)

# Post-merge sanity sweep. Path-filtered at the workflow trigger so it only
# runs when a push to main actually touches a puzzle file — that's GitHub
# Actions' native file-glob conditional. The pre-merge equivalent lives in
# puzzle-checks.yml and is gated by the required-reviewer environment.

on:
  push:
    branches: [main]
    paths:
      - 'src/puzzles/day-*.ts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  itunes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:itunes
