name: iTunes ID check (post-merge)

# Post-merge changed-file sanity check. Path-filtered at the workflow trigger
# so it only runs when a push to main actually touches a puzzle file — that's
# GitHub Actions' native file-glob conditional. The pre-merge equivalent lives
# in puzzle-checks.yml and is gated by the required-reviewer environment.
#
# Manual dispatch runs the deliberate full-fleet catalog drift sweep instead.

on:
  push:
    branches: [main]
    paths:
      - 'src/puzzles/*.ts'
      - '!src/puzzles/template.ts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  itunes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Scope iTunes check to pushed puzzle files
        if: github.event_name == 'push'
        run: |
          {
            echo 'ITUNES_CHANGED_FILES<<EOF'
            git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" "${{ github.sha }}" -- 'src/puzzles/*.ts' ':(exclude)src/puzzles/template.ts'
            echo EOF
          } >> "$GITHUB_ENV"
      - name: Changed puzzle iTunes check
        if: github.event_name == 'push'
        run: npm run test:itunes
      - name: Full-fleet iTunes sweep
        if: github.event_name == 'workflow_dispatch'
        run: npm run test:itunes:all
